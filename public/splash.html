<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Industrial Control Tower - Initializing</title>
  <!-- Google Fonts: Outfit & JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#06080c] text-slate-100 font-sans overflow-hidden select-none flex items-center justify-center min-h-screen relative">
  <!-- ponytail: simplified background grid and glow circles using Tailwind utilities -->
  <!-- Ambient Glow Effects -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[350px] h-[350px] rounded-full bg-blue-500/10 blur-[80px] pointer-events-none animate-pulse"></div>
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[200px] h-[200px] rounded-full bg-cyan-500/5 blur-[50px] pointer-events-none"></div>

  <!-- Cyber Grid -->
  <div class="absolute inset-0 opacity-15 pointer-events-none" style="background-image: linear-gradient(rgba(37, 99, 235, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(37, 99, 235, 0.1) 1px, transparent 1px); background-size: 32px 32px;"></div>

  <!-- Splash Container -->
  <div class="text-center z-10 max-w-sm px-6">
    <!-- Glowing Hexagon Logo Holder -->
    <div class="relative w-20 h-20 mx-auto mb-6 flex items-center justify-center">
      <div class="absolute inset-0 bg-blue-500/20 rounded-2xl rotate-45 animate-[spin_10s_linear_infinite] border border-blue-500/30"></div>
      <div class="absolute inset-1.5 bg-[#0c0f17] rounded-xl rotate-45 border border-slate-800"></div>
      
      <!-- Central Animated Core -->
      <div class="relative z-10 w-8 h-8 rounded-full bg-gradient-to-tr from-blue-600 to-cyan-400 flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.6)] animate-pulse">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
    </div>

    <!-- Title and Subtitle -->
    <h1 class="text-xl font-extrabold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-slate-400 uppercase">
      Industrial Tower
    </h1>
    <p class="text-[10px] font-mono text-cyan-400 tracking-[0.25em] uppercase mt-1">
      Autonomic Fleet Tower
    </p>

    <!-- Progress Status Bar -->
    <div class="mt-8 relative">
      <div class="h-[3px] w-full bg-slate-900 rounded-full overflow-hidden border border-slate-800/50">
        <div class="h-full bg-gradient-to-r from-blue-600 via-cyan-400 to-blue-500 rounded-full w-[45%] animate-[progress_3s_ease-in-out_infinite]"></div>
      </div>
    </div>

    <!-- Loading Indicators -->
    <div class="mt-4 flex items-center justify-center space-x-2 text-[10px] font-mono text-slate-500">
      <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 animate-ping"></span>
      <span id="status-text" class="tracking-widest uppercase">Initializing IoT Gateway...</span>
    </div>
  </div>

  <!-- Custom Keyframes Animation Utility -->
  <style>
    @keyframes progress {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
  </style>

  <script>
    // Status text transition simulator
    const statuses = [
      "Establishing Secure MQTT Gateway...",
      "Syncing Supply Chain Sourcing Graph...",
      "Pre-loading RAG Equipment Manuals...",
      "Launching Fleet Supervisor Daemon...",
      "Starting Relational & Vector Databases..."
    ];
    let currentIdx = 0;
    const statusTextEl = document.getElementById("status-text");

    setInterval(() => {
      currentIdx = (currentIdx + 1) % statuses.length;
      statusTextEl.style.opacity = 0;
      setTimeout(() => {
        statusTextEl.textContent = statuses[currentIdx];
        statusTextEl.style.opacity = 1;
      }, 200);
    }, 2500);
  </script>
</body>
</html>
